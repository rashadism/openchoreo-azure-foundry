# Provisions a model deployment inside an existing Azure AI Foundry account.
# ASO manages it declaratively (create / heal / delete).
# ASO CognitiveServices needs v2.15.0+; verify the apiVersion against your install.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: azure-foundry-model
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required: [modelName]
      properties:
        modelName:
          type: string
          # Known Foundry chat models; regenerate from `az cognitiveservices model list -l <region>`.
          enum:
            - gpt-4o
            - gpt-4o-mini
            - gpt-4.1
            - gpt-4.1-mini
            - gpt-4.1-nano
            - gpt-5
            - gpt-5-chat
            - gpt-5-mini
            - gpt-5-nano
            - gpt-5.1
            - gpt-5.1-chat
            - gpt-5.2
            - gpt-5.2-chat
            - gpt-5.3-chat
            - gpt-5.4
            - gpt-5.4-mini
            - gpt-5.4-nano
            - gpt-5.5
            - gpt-5.6-luna
            - gpt-5.6-sol
            - gpt-5.6-terra
            - gpt-chat-latest
            - o1
            - o3
            - o3-mini
            - o4-mini
        # Optional: omit to use the model's current default version.
        modelVersion: { type: string }
        modelFormat:  { type: string, default: OpenAI }
        # Deployment tier (per-token vs zone-scoped vs reserved capacity).
        skuName:
          type: string
          default: GlobalStandard
          enum: [GlobalStandard, Standard, DataZoneStandard, ProvisionedManaged]
        # Rate limit in thousands of tokens/min (1 = 1k TPM). Bounded by your model quota.
        capacity:     { type: integer, default: 10 }

  # Per-environment: account differs between dev and prod.
  environmentConfigs:
    openAPIV3Schema:
      type: object
      required: [accountArmId, accountEndpoint]
      properties:
        accountArmId:    { type: string }
        accountEndpoint: { type: string }
        capacity:        { type: integer }

  retainPolicy: Delete

  outputs:
    - name: deploymentName
      value: "${parameters.modelName}"
    - name: endpoint
      value: "${environmentConfigs.accountEndpoint}"

  resources:
    - id: modelDeployment
      readyWhen: "${applied.modelDeployment.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')}"
      template:
        apiVersion: cognitiveservices.azure.com/v1api20250601
        kind: Deployment
        metadata:
          name: ${metadata.name}-model
          namespace: ${metadata.namespace}
        spec:
          owner:
            armId: ${environmentConfigs.accountArmId}
          azureName: ${parameters.modelName}
          properties:
            model:
              format:  ${parameters.modelFormat}
              name:    ${parameters.modelName}
              version: ${parameters.modelVersion}
          sku:
            name:     ${parameters.skuName}
            capacity: ${environmentConfigs.capacity}
