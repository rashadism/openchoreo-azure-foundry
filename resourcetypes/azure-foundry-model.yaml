# Provisions a model deployment inside an existing Azure AI Foundry account.
# ASO manages it declaratively (create / heal / delete).
# ASO CognitiveServices needs v2.15.0+; verify the apiVersion against your install.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: azure-foundry-model
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required: [modelName]
      properties:
        modelName:
          type: string
          description: Foundry model to deploy.
          # Known Foundry chat models; regenerate from `az cognitiveservices model list -l <region>`.
          enum:
            - gpt-4o
            - gpt-4o-mini
            - gpt-4.1
            - gpt-4.1-mini
            - gpt-4.1-nano
            - gpt-5
            - gpt-5-chat
            - gpt-5-mini
            - gpt-5-nano
            - gpt-5.1
            - gpt-5.1-chat
            - gpt-5.2
            - gpt-5.2-chat
            - gpt-5.3-chat
            - gpt-5.4
            - gpt-5.4-mini
            - gpt-5.4-nano
            - gpt-5.5
            - gpt-5.6-luna
            - gpt-5.6-sol
            - gpt-5.6-terra
            - gpt-chat-latest
            - o1
            - o3
            - o3-mini
            - o4-mini
        modelVersion: { type: string, description: Model version; omit to use the model's default. }
        modelFormat:  { type: string, default: OpenAI, description: Model publisher/format. }
        skuName:
          type: string
          default: GlobalStandard
          description: Deployment tier (per-token, zone-scoped, or reserved capacity).
          enum: [GlobalStandard, Standard, DataZoneStandard, ProvisionedManaged]
        capacity:     { type: integer, default: 10, description: Rate limit in thousands of tokens/min (1 = 1k TPM); bounded by quota. }

  # No environmentConfigs: the developer picks only the model. The Foundry account
  # is referenced by name via a PE-provisioned ASO Account CR (foundry-account) that
  # adopts the real account; the project endpoint comes from the foundry-account
  # ConfigMap. No Azure IDs live in this type.
  retainPolicy: Delete

  outputs:
    - name: deploymentName
      value: "${parameters.modelName}"
    - name: endpoint
      configMapKeyRef:
        name: foundry-account
        key: projectEndpoint

  resources:
    - id: modelDeployment
      readyWhen: "${has(applied.modelDeployment.status.conditions) && applied.modelDeployment.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')}"
      template:
        apiVersion: cognitiveservices.azure.com/v1api20250601
        kind: Deployment
        metadata:
          name: ${metadata.name}-model
          namespace: ${metadata.namespace}
        spec:
          owner:
            name: foundry-account          # PE-provisioned ASO Account CR that adopts the real account
          azureName: ${parameters.modelName}
          properties:
            model:
              format:  ${parameters.modelFormat}
              name:    ${parameters.modelName}
              # Optional: omit → the version key is dropped and Azure uses the model's default.
              # Block scalar so the ternary's ':' doesn't confuse the YAML parser.
              version: |
                ${has(parameters.modelVersion) ? parameters.modelVersion : oc_omit()}
          sku:
            name:     ${parameters.skuName}
            capacity: ${parameters.capacity}
