# Prompt agent that hands off to the Crossplane provider (crossplane/) instead of a Job.
# OpenChoreo renders a FoundryAgent CR; the provider creates / heals / deletes the agent.
# No Job, no token secret — the provider authenticates with its own identity.
# Requires the provider-foundry CRD + controller installed on the cluster.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: azure-foundry-prompt-agent-xp
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required: [agentName, modelDeploymentName, instructions]
      properties:
        agentName:           { type: string }
        modelDeploymentName: { type: string }
        instructions:        { type: string }
  environmentConfigs:
    openAPIV3Schema:
      type: object
      required: [projectEndpoint]
      properties:
        projectEndpoint: { type: string }
  retainPolicy: Delete
  outputs:
    - name: agentName
      value: "${parameters.agentName}"
    - name: endpoint
      value: "${environmentConfigs.projectEndpoint}/agents/${parameters.agentName}"
  resources:
    - id: agent
      readyWhen: "${applied.agent.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')}"
      template:
        apiVersion: foundry.openchoreo.dev/v1alpha1
        kind: FoundryAgent
        metadata:
          name: ${metadata.name}          # FoundryAgent is cluster-scoped — no namespace
        spec:
          forProvider:
            projectEndpoint: ${environmentConfigs.projectEndpoint}
            agentName:       ${parameters.agentName}
            model:           ${parameters.modelDeploymentName}
            instructions:    ${parameters.instructions}
