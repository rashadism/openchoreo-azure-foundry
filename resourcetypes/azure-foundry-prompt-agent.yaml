# Creates a prompt agent (code-less) in an existing Azure AI Foundry project.
# A prompt agent is just model + instructions — no container, no registry.
# A one-shot Job POSTs it to the project's REST API.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: azure-foundry-prompt-agent
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required: [agentName, modelDeploymentName, instructions]
      properties:
        agentName:           { type: string }
        modelDeploymentName: { type: string }
        instructions:        { type: string }

  environmentConfigs:
    openAPIV3Schema:
      type: object
      required: [projectEndpoint]
      properties:
        projectEndpoint: { type: string }
        credentialServiceAccount: { type: string, default: azure-foundry-deployer }

  retainPolicy: Delete

  outputs:
    - name: agentName
      value: "${parameters.agentName}"
    - name: endpoint
      value: "${environmentConfigs.projectEndpoint}/agents/${parameters.agentName}"

  resources:
    - id: agentJob
      # Readiness comes from the default per-Kind Job heuristic (Job Complete = ready).
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${metadata.name}-create-agent
          namespace: ${metadata.namespace}
        spec:
          backoffLimit: 4
          template:
            metadata:
              labels:
                azure.workload.identity/use: "true"
            spec:
              serviceAccountName: ${environmentConfigs.credentialServiceAccount}
              restartPolicy: Never
              containers:
                - name: create-agent
                  image: mcr.microsoft.com/azure-cli:2.88.0
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -e
                      TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)
                      curl -sf -X POST "${environmentConfigs.projectEndpoint}/agents?api-version=v1" \
                        -H "Authorization: Bearer $TOKEN" \
                        -H "Content-Type: application/json" \
                        -d '{
                          "name": "${parameters.agentName}",
                          "definition": {
                            "kind": "prompt",
                            "model": "${parameters.modelDeploymentName}",
                            "instructions": "${parameters.instructions}"
                          }
                        }'
