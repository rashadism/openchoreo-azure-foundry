# The Azure AI Foundry agent. OpenChoreo renders a FoundryAgent CR; the Crossplane
# provider (crossplane/) creates / heals / deletes the agent — full lifecycle, no Job,
# no token secret (the provider authenticates with its own identity). The project
# endpoint comes from the PE-provisioned `foundry-account` ConfigMap, so the developer
# supplies only the agent's shape.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: azure-foundry-agent
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required: [modelDeploymentName]
      properties:
        agentName: { type: string, description: Name for the agent in Foundry; defaults to the Resource name. Must be unique in the project. }
        # A model DEPLOYMENT name (as named by azure-foundry-model's deploymentName),
        # not a bare model — deployments aren't necessarily named after their model.
        modelDeploymentName: { type: string, description: Name of the model deployment the agent runs on. }
        instructions: { type: string, default: "You are a helpful assistant.", description: System prompt shaping the agent's behaviour. }
        mcpServers:
          type: array
          default: []
          description: MCP tool servers the agent may call (zero or more).
          items:
            type: object
            required: [serverLabel, serverUrl]
            properties:
              serverLabel: { type: string, description: Short label identifying the MCP server. }
              serverUrl:   { type: string, description: Base URL of the MCP server. }
  retainPolicy: Delete
  outputs:
    - name: agentName
      value: "${parameters.?agentName.orValue(metadata.resourceName)}"
    - name: endpoint
      configMapKeyRef:
        name: foundry-account
        key: projectEndpoint
  resources:
    - id: agent
      readyWhen: "${has(applied.agent.status.conditions) && applied.agent.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')}"
      template:
        apiVersion: foundry.openchoreo.dev/v1alpha1
        kind: FoundryAgent
        metadata:
          name: ${metadata.name}          # FoundryAgent is cluster-scoped — no namespace
        spec:
          forProvider:
            agentName:    ${parameters.?agentName.orValue(metadata.resourceName)}
            model:        ${parameters.modelDeploymentName}
            instructions: ${parameters.instructions}
            # Map each mcpServers[] entry into a FoundryAgent MCP tool (auto-approved).
            mcpTools: '${parameters.mcpServers.map(s, {"serverLabel": s.serverLabel, "serverURL": s.serverUrl, "requireApproval": "never"})}'
