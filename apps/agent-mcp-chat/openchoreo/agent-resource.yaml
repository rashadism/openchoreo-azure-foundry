# OPTIONAL: an agent Resource that provisions the Foundry prompt agent through
# the platform (Crossplane FoundryAgent CR behind ClusterResourceType
# azure-foundry-prompt-agent-xp).
#
# ---------------------------------------------------------------------------
# KNOWN GAP: as of this writing the azure-foundry-prompt-agent-xp ResourceType
# does NOT expose a `tools` / MCP array to the FoundryAgent CR. So a Resource
# created from it produces an agent WITHOUT the MCP tool. Until the passthrough
# lands, create the agent (with the MCP tool) using ../create_agent.py, and keep
# AGENT_NAME here in sync with the created agent. Adding a `tools` passthrough to
# the ResourceType/Crossplane composition is the productized path (see README).
# ---------------------------------------------------------------------------
apiVersion: openchoreo.dev/v1alpha1
kind: Resource
metadata:
  name: mcp-agent
  namespace: default
spec:
  owner:
    projectName: default
    componentName: agent-mcp-chat
  resourceType:
    kind: ClusterResourceType
    name: azure-foundry-prompt-agent-xp
  # Parameters accepted by the current ResourceType. `model` + `instructions`
  # are supported; `tools`/MCP is NOT yet (see gap note above).
  parameters:
    agentName: mcp-agent
    model: gpt-5-mini
    instructions: >-
      You are a helpful assistant that uses the api-specs MCP tools to answer
      questions about the Azure REST API specifications.
    # tools:                       # <-- NOT honored by azure-foundry-prompt-agent-xp yet
    #   - type: mcp
    #     server_label: api-specs
    #     server_url: https://gitmcp.io/Azure/azure-rest-api-specs
    #     require_approval: never
