# Runs the FoundryAgent provider in-cluster as a Deployment.
# Azure creds come from the `azure-foundry-sp` Secret (SP), read by
# DefaultAzureCredential's EnvironmentCredential — auto-refreshing, no `az` needed.
# The Secret is created out-of-band (kubectl create secret), not committed here.
apiVersion: v1
kind: Namespace
metadata:
  name: provider-foundry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-foundry
  namespace: provider-foundry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-foundry
rules:
  - apiGroups: ["foundry.openchoreo.dev"]
    resources: ["foundryagents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["foundry.openchoreo.dev"]
    resources: ["foundryagents/status", "foundryagents/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Read the PE-provisioned `foundry-account` ConfigMap for the project endpoint.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-foundry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-foundry
subjects:
  - kind: ServiceAccount
    name: provider-foundry
    namespace: provider-foundry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-foundry
  namespace: provider-foundry
spec:
  replicas: 1
  selector:
    matchLabels: { app: provider-foundry }
  template:
    metadata:
      labels: { app: provider-foundry }
    spec:
      serviceAccountName: provider-foundry
      containers:
        - name: provider
          image: ttl.sh/provider-foundry-rashad:v4-8h
          envFrom:
            - secretRef:
                name: azure-foundry-sp   # AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_CLIENT_SECRET
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
