# Lets OpenChoreo's data-plane agent apply the FoundryAgent CRs that the
# azure-foundry-prompt-agent-xp ResourceType renders. Needed once, when a
# ResourceType emits a custom CRD the agent has no default permission for.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openchoreo-foundryagent-access
rules:
  - apiGroups: ["foundry.openchoreo.dev"]
    resources: ["foundryagents", "foundryagents/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openchoreo-foundryagent-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openchoreo-foundryagent-access
subjects:
  - kind: ServiceAccount
    name: cluster-agent-dataplane
    namespace: openchoreo-data-plane
